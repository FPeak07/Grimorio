name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pillow flask

      - name: Generate logo.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('Logo.png').convert('RGBA')
          bbox = img.getbbox()
          img = img.crop(bbox)
          w, h = img.size
          s = max(w, h)
          sq = Image.new('RGBA', (s, s), (0, 0, 0, 0))
          sq.paste(img, ((s - w) // 2, (s - h) // 2))
          sq.save('logo.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Build exe
        run: pyinstaller grimorio.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Output/GrimorioInstaller.exe
          generate_release_notes: true
